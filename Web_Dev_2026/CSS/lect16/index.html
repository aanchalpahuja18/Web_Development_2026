<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            /* box-sizing: border-box; */
        }
        /* div{
            border: 1px solid red;
        } */
        .box{
            width: 300px;
            height: 300px;
            border: 1px solid black;
            padding: 50px;
            display: inline;
        }

        /* span{
            border: 3px solid green;
            width: 800px;
            height: 400px;
            padding: 20px;
            margin: 10px;
            display: block;
        } */
         span{
            border: 3px solid green;
            width: 300px;
            height: 200px;
            padding: 5px;
            margin: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- <div>
        Welcome to Codehelp
    </div>

        Welcome to Codehelp 2.0
    </div> -->

    <div class="box">

    </div>

    <span>This is Aanchal Pahuja</span>

</html>
