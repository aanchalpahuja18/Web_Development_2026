<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations in CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            border: 2px solid black;
            background-color: beige;
        }
        .box{
            width: 200px;
            height: 80px;
            background-color: slateblue;
            border: 2px solid black;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            /* animation-name: RightToLeft;
            animation-timing-function: linear;
            animation-duration: 3s;
            animation-delay: 1s;
            animation-iteration-count: 1; */
            /* animation-direction: alternate-reverse; */
            /* animation-fill-mode: forwards; */

            animation: 5s linear 1s infinite alternate none running RightToLeft;
        }

        .box2{
            width: 200px;
            height: 80px;
            background-color: slateblue;
            border: 2px solid black;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            animation: 5s ease-in 1s infinite alternate none running LeftToRight;
        }

        @keyframes RightToLeft {
            from{
                left: 0px;
                top: 0px;
            }
            to{
                left: 1350px;
                top: 0px;
            }
        }

        @keyframes LeftToRight{
            from{
                top: 600px;
                left: 1350px;
            }
            to{
                top: 600px;
                left: 0px;
            }
        }

        .circle{
            height: 150px;
            width: 150px;
            border-radius: 50%;
            border: 2px solid black;
            background-color: coral;
            position: relative;
            top: 300px;
            left: 675px;
            animation: 10s ease-in-out 0s infinite alternate none running circularMovement;
        }

        @keyframes circularMovement{
            0%{
                top: 0px;
                left: 0px;
            }
            30%{
                top: 0px;
                left: 1350px;
            }
            60%{
                bottom: 0px;
                right: 0px;
            }
            100%{
                bottom: 0px;
                right: 1350px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="circle"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
