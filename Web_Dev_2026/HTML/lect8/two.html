<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Types in HTML</title>
</head>
<body>
    <form>
        <label for="text">Enter text:</label>
        <input type="text" id="text" name="textfield1">
        <br> <br>
        <label for="submit1">Button:</label>
        <input type="submit" name="submitbtn" id="submit1" value="Subscribe">
        <br> <br>
        <label for="radio1">Male:</label>
        <input type="radio" id="radio1" name="radio">
        <label for="radio2">Female:</label>
        <input type="radio" id="radio2" name="radio">
        <label for="radio3">Other:</label>
        <input type="radio" id="radio3" name="radio">
        <br> <br>

        <label for="checkbox1">Hindi:</label>
        <input type="checkbox" id="checkbox1" name="checkbox1">
        <label for="checkbox2">English:</label>
        <input type="checkbox" id="checkbox2" name="checkbox2">

        <br> <br>
        <label for="file-select">Choose a file:</label>
        <input type="file" id="file-select" name="file-select">
        <br> <br>
        <label for="inp-img">Input image:</label>
        <input type="image" id="inp-img" name="inp-img" src="https://tse2.mm.bing.net/th/id/OIP.XkmwaRBI0GidhWfhwRCnvwHaHa?w=217&h=180&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt="download-img" height="50px">

        <br> <br>
        <label for="password1">Enter your password:</label>
        <input type="password" id="password1" name="password1">
        <br> <br>
        <label for="datepicker">Date Picker:</label>
        <input type="date" id="datepicker" name="datepicker">
    </form>
</body>
</html>
