<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Elements in HTMl</title>
</head>
<body>
    <form>

        <fieldset>
            <legend>HTML Dummy Form:</legend>
             <label for="datepicker">Choose Date:</label>
                <input type="date" id="datepicker">

                <br> <br>

                <label for="selector1">Choose a dish:</label>
                <select name="dishes" id="selector1" multiple>
                    <option value="maggie">Maggie</option>
                    <option value="kurkure">Kurkure</option>
                    <option value="chips">Chips</option>
                </select>

                <br> <br>
                <button>Me hu button</button>

                <br> <br>
                <label for="textarea1">Enter your text here:</label>
                <textarea name="textarea1" id="textarea1" value="value is present" placeholder="Enter text here.." cols="30" rows="10"></textarea>
        </fieldset>

    </form>
</body>
</html>
