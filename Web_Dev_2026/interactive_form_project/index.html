<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Form Validator Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-content">
        <h1>Interactive Form Validator Project</h1>
        <form>
            <div class="content">
                <div id="name-box">
                    <label for="name" class="labels">Enter your Name:</label> <br>
                    <input type="text" id="name" placeholder="John Doe" class="input baseBorder">
                </div>
                <br> <br>

                <div id="email-box">
                    <label for="email" class="labels">Enter your Email:</label> <br>
                    <input type="email" id="email" placeholder="abc@gmail.com" class="input baseBorder">
                </div>
                <br> <br>

                <div id="age-box">
                    <label for="age" class="labels">Enter your Age:</label> <br>
                    <input type="number" id="age" placeholder="34 years" class="input baseBorder">
                </div>

                <br> <br>
                <button id="submit-btn">Submit</button>
            </div>
        </form>
    </div>

    <script src="index.js"></script>
</body>
</html>
